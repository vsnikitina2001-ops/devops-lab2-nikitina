name: Docker Build and Push

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/my-flask-app:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/my-flask-app:latest
        cache-to: type=inline
        
    - name: Deploy step (simulated)
      run: |
        echo "🚀 Image successfully built and pushed to Docker Hub"
        echo "Image: ${{ secrets.DOCKER_USERNAME }}/my-flask-app:latest"
        echo "✅ Deployment would happen here (e.g., SSH to server, update k8s, etc.)"
